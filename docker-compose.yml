services:
  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      - SCRAPER_API_KEY=${SCRAPER_API_KEY}
      - MONGODB_URI=${MONGODB_URI}
      - NODE_ENV=production
    dns:
      - 8.8.8.8
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5000/api/test', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      args:
        - REACT_APP_API_URL=http://localhost:5000
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
